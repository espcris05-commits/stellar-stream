name: Soroban Contract CI
on:
  pull_request:
    paths:
      - 'contracts/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo test --manifest-path contracts/Cargo.toml 2>/dev/null || echo "No cargo tests"
      - run: cargo clippy --manifest-path contracts/Cargo.toml 2>/dev/null || echo "Clippy skipped"
