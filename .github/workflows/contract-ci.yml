name: Soroban Contract CI

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contract-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contract-ci.yml"

jobs:
  contract-test:
    name: Build and test Soroban contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust version compatibility
        run: rustc --version && cargo --version

      - name: Check contract formatting
        run: cargo fmt --all -- --check

      - name: Run clippy (lint)
        run: cargo clippy --all-targets --all-features -- -D warnings 2>/dev/null || echo "::warning::Clippy warnings found - review output"
        continue-on-error: true

      - name: Build contract (debug)
        run: cargo build --locked

      - name: Run contract tests
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --locked

      - name: Build WASM release binary
        run: cargo build --target wasm32-unknown-unknown --release --locked

      - name: Report WASM binary size
        run: |
          WASM_FILE=\$(find target/wasm32-unknown-unknown/release -name "*.wasm" | head -1)
          if [ -n "\$WASM_FILE" ]; then
            SIZE_BYTES=\$(wc -c < "\$WASM_FILE")
            SIZE_KB=\$(echo "scale=2; \$SIZE_BYTES / 1024" | bc)
            echo "### WASM Binary Size" >> \$GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> \$GITHUB_STEP_SUMMARY
            echo "|------|------|" >> \$GITHUB_STEP_SUMMARY
            echo "| \`\$WASM_FILE\` | \${SIZE_KB} KB (\${SIZE_BYTES} bytes) |" >> \$GITHUB_STEP_SUMMARY
          else
            echo "No WASM file found." >> \$GITHUB_STEP_SUMMARY
          fi