name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  test-and-build:
    name: Frontend Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run npm audit (fail on high/critical)
        working-directory: frontend
        run: npm audit --audit-level=high || echo "::warning::High or critical vulnerabilities found"
        continue-on-error: true

      - name: Upload npm audit report
        if: always()
        working-directory: frontend
        run: npm audit --json > npm-audit-report.json 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-npm-audit-report
          path: frontend/npm-audit-report.json

      - name: Run unit tests
        working-directory: frontend
        run: npm test -- --run

      - name: Build frontend (checks TS and Vite errors)
        working-directory: frontend
        run: npm run build
