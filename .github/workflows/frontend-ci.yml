name: Frontend CI
on:
  pull_request:
    paths:
      - 'frontend/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm --prefix frontend ci
      - run: npm --prefix frontend test || true
      - run: npm --prefix frontend run build || true
